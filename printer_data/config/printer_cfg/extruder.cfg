#####################################################################
#   Extruder
#####################################################################
##  Connected to MOTOR_6
##  Heater - HE0
##  Thermistor - T0
[extruder]
step_pin: toolhead:E_STEP
dir_pin: toolhead:E_DIR
enable_pin: !toolhead:E_ENABLE
##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.6789511 is a good starting point
rotation_distance: 22.746988 #Bondtech 5mm Drive Gears
gear_ratio: 50:10               #BMG Gear Ratio
microsteps: 32
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: toolhead:E_HEATER
sensor_type: MAX31865
sensor_pin: toolhead:MAX31865_NSS
spi_bus: spi1
rtd_nominal_r: 1000
rtd_reference_r: 4300
rtd_num_of_wires: 2
rtd_use_50Hz_filter: True
max_extrude_only_distance: 200.0
min_temp: 10.0
max_temp: 350.0
max_power: 0.75
min_extrude_temp: 180
# PID control tuned with PID_CALIBRATE HEATER=extruder TARGET=250 MAX_POWER=1
control: pid
pid_Kp: 15.223
pid_Ki: 1.005
pid_Kd: 57.657
##  Try to keep pressure_advance below 1.0
pressure_advance: 0.04 
#pressure_advance_smooth_time: 0.040


[tmc2240 extruder]
cs_pin: toolhead:TMC_CS
spi_software_sclk_pin: toolhead:TMC_CLK
spi_software_mosi_pin: toolhead:TMC_MOSI
spi_software_miso_pin: toolhead:TMC_MISO
driver_TPFD: 0
run_current: 0.600
stealthchop_threshold: 0

