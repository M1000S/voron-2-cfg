# This file stores the flash_commands for each mcus
# Previous version KCONFIG_CONFIG was needed now it is automaticly added when make flash is called
# version : 0.2
# tested/supported flash methods :
#  - make flash
#  - sdcard_flash
#  - flashtool.py
#  - mount/cp/umount (for rp2040)
#  - external scripts ...

# This file stores the flash_commands for each mcus
# Previous version KCONFIG_CONFIG was needed now it is automaticly added when make flash is called
# version : 0.2
# tested/supported flash methods :
#  - make flash
#  - sdcard_flash
#  - flashtool.py
#  - mount/cp/umount (for rp2040)
#  - external scripts ...

[cartographer]
klipper_section: mcu cartographer
is_klipper_fw: false
action_command: git -C ~/cartographer_firmware pull
action_command: ~/cartographer_firmware/fw_update.sh

[rpi]
klipper_section: mcu host
action_command: make flash

[Octopus]
klipper_section: mcu
#action_command: make flash FLASH_DEVICE=/dev/serial/by-path/platform-fd500000.pcie-pci-0000:01:00.0-usb-0:1.1:1.0 
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -d /dev/serial/by-id/usb-Klipper_stm32f446xx_1D004E000251313133353932-if00

[Stealthburner]
klipper_section: mcu SB2240
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u 79a866722924

[tradrack]
klipper_section: mcu mmu
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u 0f0140e4ead3

[emu_0]
klipper_section: mcu mmu0
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u 9a45a2ca6382

[emu_1]
klipper_section: mcu mmu1
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u 0002e29cf7d4

[emu_2]
klipper_section: mcu mmu2
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u df26c6aadc5d

[emu_3]
klipper_section: mcu mmu3
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u 2abb268c9e00

[emu_4]
klipper_section: mcu mmu4
action_command: ~/klippy-env/bin/python3 ~/katapult/scripts/flashtool.py -i can0 -u dedeb704ef67

